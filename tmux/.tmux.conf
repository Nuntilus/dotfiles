# Set prefix to Space (instead of Ctrl-b)
unbind C-b
set -g prefix Space
bind Space send-prefix

# Move between splits with Ctrl+hjkl (no prefix)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Vertical split: Space + s
bind h split-window -h

# Horizontal split: Space + v
bind v split-window -v

# New window: Space + n
bind n new-window

# Next window: Tab
bind -n Tab next-window

# Previous window: Shift+Tab
bind -n S-Tab previous-window
