# Set prefix to C (instead of Ctrl-b)
unbind C-b
set -g prefix C
bind C send-prefix

# Move between splits with Ctrl+hjkl (no prefix)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Vertical split: Space + s
bind h split-window -h

# Horizontal split: Space + v
bind v split-window -v

# New window: Space + n
bind n new-window

# Next window: Tab
bind -n Tab next-window

# Previous window: Shift+Tab
bind -n S-Tab previous-window

# Vi-style copy mode
set -g mode-keys vi
set -g status-keys vi

# Enter copy mode with prefix+Escape (like normal mode)
bind Escape copy-mode

# Copy mode bindings (vi-like)
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line
bind -T copy-mode-vi Escape send -X cancel

# "Normal mode" key table — press prefix+n to enter, Escape or i to exit
# In normal mode: hjkl navigate panes, others pass through
bind N switch-client -T normal

bind -T normal h     select-pane -L
bind -T normal j     select-pane -D
bind -T normal k     select-pane -U
bind -T normal l     select-pane -R
bind -T normal H     previous-window
bind -T normal L     next-window
bind -T normal i     switch-client -T root
bind -T normal Escape switch-client -T root
